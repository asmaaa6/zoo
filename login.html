{% extends "base.html" %}

{% block title %}Connexion - RecrutAI{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-lg border-0" style="border-radius: 15px;">
                    <div class="card-body p-5">
                        {% if error %}
                        <div class="alert alert-danger alert-dismissible fade show" role="alert">
                            {{ error }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        {% endif %}
                        
                        <div class="text-center mb-4">
                            <i class="fas fa-sign-in-alt" style="font-size: 2.5rem; color: var(--primary);"></i>
                            <h4 class="mt-3 fw-bold">Connexion</h4>
                            <p class="text-muted">Accédez à votre compte RecrutAI</p>
                        </div>

                        <form method="POST" class="needs-validation" novalidate>
                            <div class="mb-3">
                                <label for="email" class="form-label fw-bold">Email</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label fw-bold">Mot de passe</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>

                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="remember" name="remember">
                                    <label class="form-check-label" for="remember">
                                        Se souvenir de moi
                                    </label>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary-custom w-100 fw-bold">
                                Connexion
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="text-muted">Pas encore de compte ? 
                                <a href="/signup" class="text-primary text-decoration-none fw-bold">Créer un compte</a>
                            </p>
                        </div>

                        <a href="#" class="d-block text-center text-primary text-decoration-none small mt-3">
                            Mot de passe oublié ?
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
