{% extends "base.html" %}

{% block title %}Inscription - RecrutAI{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="card shadow-lg border-0" style="border-radius: 15px;">
                    <div class="card-body p-5">
                        {% if error %}
                        <div class="alert alert-danger alert-dismissible fade show" role="alert">
                            {{ error }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        {% endif %}
                        
                        <div class="text-center mb-4">
                            <i class="fas fa-user-plus" style="font-size: 2.5rem; color: var(--primary);"></i>
                            <h4 class="mt-3 fw-bold">Créer un compte</h4>
                            <p class="text-muted">Rejoignez la plateforme RecrutAI</p>
                        </div>

                        <form method="POST" class="needs-validation" novalidate>
                            <div class="mb-3">
                                <label for="username" class="form-label fw-bold">Nom d'utilisateur</label>
                                <input type="text" class="form-control" id="username" name="username" required>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label fw-bold">Email</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>

                            <div class="mb-3">
                                <label for="role" class="form-label fw-bold">Je suis...</label>
                                <select class="form-select" id="role" name="role" required>
                                    <option value="">-- Sélectionnez --</option>
                                    <option value="candidate">Candidat</option>
                                    <option value="recruiter">Recruteur</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label fw-bold">Mot de passe</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>

                            <div class="mb-4">
                                <label for="confirm_password" class="form-label fw-bold">Confirmer le mot de passe</label>
                                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                            </div>

                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="terms" name="terms" required>
                                    <label class="form-check-label" for="terms">
                                        J'accepte les <a href="#">conditions d'utilisation</a>
                                    </label>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary-custom w-100 fw-bold">
                                S'inscrire
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="text-muted">Vous avez déjà un compte ? 
                                <a href="/login" class="text-primary text-decoration-none fw-bold">Se connecter</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
